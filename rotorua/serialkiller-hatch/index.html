<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f0">
  <title>Files</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <!-- Home screen -->
    <div id="home-screen" class="screen active">
      <header class="header">
        <h1 class="header-title">Files</h1>
        <a href="admin.html" class="header-admin">Admin</a>
      </header>
      <main class="main">
        <div id="category-grid" class="category-grid">
          <!-- Categories rendered by JS -->
        </div>
      </main>
    </div>

    <!-- Category screen -->
    <div id="category-screen" class="screen">
      <header class="header">
        <button type="button" class="header-back" id="category-back" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <h1 class="header-title" id="category-title">Documents</h1>
      </header>
      <main class="main">
        <div id="document-list" class="document-list">
          <!-- Documents rendered by JS -->
        </div>
      </main>
    </div>

    <!-- Document screen -->
    <div id="document-screen" class="screen">
      <header class="header">
        <button type="button" class="header-back" id="document-back" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <h1 class="header-title" id="document-title">Document</h1>
      </header>
      <main class="main">
        <div id="document-content" class="document-view">
          <!-- Content rendered by JS -->
        </div>
      </main>
    </div>
  </div>

  <!-- Password modal -->
  <div id="password-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" id="password-modal-card">
      <h2 class="modal-title">Enter the code</h2>
      <input type="text" id="password-input" class="modal-input" placeholder="..." autocomplete="off">
      <div class="modal-actions">
        <button type="button" class="modal-btn modal-btn-cancel" id="password-cancel">Cancel</button>
        <button type="button" class="modal-btn modal-btn-unlock" id="password-unlock">Unlock</button>
      </div>
    </div>
  </div>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
