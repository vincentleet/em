<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f5f0">
  <title>Admin – Serial Killer Hatch</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="admin-header">
    <h1>Admin – Content Editor</h1>
    <p>Edit categories and documents. Changes apply immediately in the main app.</p>
  </header>

  <div class="admin-actions">
    <button type="button" class="admin-btn admin-btn-save" id="btn-save">Save</button>
    <button type="button" class="admin-btn admin-btn-reset" id="btn-reset">Reset to default</button>
    <button type="button" class="admin-btn admin-btn-export" id="btn-export">Export content.json</button>
    <button type="button" class="admin-btn admin-btn-import" id="btn-import">Import</button>
    <input type="file" id="import-file" accept=".json">
  </div>

  <p class="admin-message" id="admin-message"></p>

  <main class="admin-content">
    <a href="index.html" class="admin-back">&larr; Back to app</a>

    <section class="admin-section">
      <h2>Categories</h2>
      <div id="categories-container"></div>
      <button type="button" class="admin-add-btn" id="add-category">+ Add category</button>
    </section>

    <section class="admin-section">
      <h2>Documents</h2>
      <div id="documents-container"></div>
      <button type="button" class="admin-add-btn" id="add-document">+ Add document</button>
    </section>
  </main>

  <script src="js/content.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
