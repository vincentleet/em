name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "rotorua/legacyofthespy-pc/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rotorua/legacyofthespy-pc/package-lock.json

      - name: Install dependencies
        working-directory: rotorua/legacyofthespy-pc
        run: npm ci

      - name: Build
        working-directory: rotorua/legacyofthespy-pc
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rotorua/legacyofthespy-pc/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
